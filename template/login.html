    <div class="header-content">
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <div class="header-texts">
                        <h1 class="cd-headline clip is-full-width wow fadeInUp" data-wow-duration=".5s">
                            <span>Oasys :</span> 
                            <span class="cd-words-wrapper">
                                <b class="is-visible">Online</b>
                                <b>Approval</b>
                                <b>System</b>
                            </span>
                        </h1>
                        <p class="lead wow fadeInUp" data-wow-duration=".5s" data-wow-delay=".3s">OASYS : ONLINE APPROVAL SYSTEM is a blablabla</p>
                        <ul class="buttons">
                            <form name="form" method="post" ng-submit="form.$valid && login()" novalidate>
                                <div ng-if="error" class="alert alert-danger" ng-bind="error"></div>
                                <div class="form-row">
                                    <div class="col-md-12">
                                        <div class="position-relative form-group" ng-class="{ 'has-error': form.$submitted && form.username.$invalid }">
                                            <input name="username" id="username" placeholder="Username" type="text" class="form-control" ng-model="username" required >
                                            <div ng-messages="form.$submitted && form.username.$error" class="help-block">
                                                <div ng-message="required">Username is required</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-12">
                                        <div class="position-relative form-group">
                                            <input name="password" id="password" placeholder="Password" type="password" class="form-control" ng-model="password" required>
                                            <div ng-messages="form.$submitted && form.password.$error" class="help-block">
                                                <div ng-message="required">Password is required</div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                 
                            </form>
                            <!-- <li><a href="#" class="button wow fadeInUp" data-wow-duration=".5s" data-wow-delay=".6s">Login</a></li> -->
                            <li><button type="submit" ng-disabled="loading"class="button wow fadeInUp" data-wow-duration=".5s" data-wow-delay=".6s" ng-click="login()" >Login</button></li>
                            <div ng-if="loading" class="ball-scale-multiple">
                                <div style="background-color: rgb(117, 213, 138);"></div>
                                <div style="background-color: rgb(117, 213, 138);"></div>
                                <div style="background-color: rgb(117, 213, 138);"></div>
                            </div>
                        </ul>
                    </div>
